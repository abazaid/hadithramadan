<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">مدونة الشيخ جواد عبد المحسن - حديث رمضان</title>
  <desc id="desc">غلاف افتراضي لموقع حديث رمضان</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#123524"/>
      <stop offset="100%" stop-color="#6d8f4e"/>
    </linearGradient>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="rgba(255,255,255,0.16)" />
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <g fill="#f8f3e7" font-family="Noto Naskh Arabic, Tahoma, Arial, sans-serif" text-anchor="middle">
    <text x="600" y="260" font-size="66" font-weight="700">مدونة الشيخ جواد عبد المحسن</text>
    <text x="600" y="345" font-size="56" font-weight="700">حديث رمضان</text>
    <text x="600" y="425" font-size="30" opacity="0.9">أرشيف علمي ومنهجي للمقالات والكتب</text>
  </g>
</svg>
